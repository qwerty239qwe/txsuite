name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v

  nextflow-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: nf-core/setup-nextflow@v3
        with:
          version: "26.04"
      - run: touch /tmp/txsuite-stub.h5ad
      - run: >-
          nextflow run src/txsuite/resources/nextflow/main.nf
          -stub-run -profile local
          -work-dir /tmp/txsuite-nextflow-work
          --input /tmp/txsuite-stub.h5ad
          --outdir /tmp/txsuite-nextflow-results
          --single_cell_image txsuite/single-cell-python:stub
          --bulk_image txsuite/bulk-r:stub
